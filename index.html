<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Cup 2026 Sweepstake</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=20260624" />
</head>
<body>

<div class="bg-orbs" aria-hidden="true">
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
</div>

  <header id="site-header">
    <div class="header-top">
      <div class="header-title">
        <span class="header-ball">⚽</span>
        <div>
          <h1>World Cup 2026 <span class="header-sub">Sweepstake</span></h1>
          <p class="pot-label">Prize Pot: <strong class="pot-amount">£50</strong> &bull; 5 players &bull; Last Man Standing</p>
        </div>
      </div>
      <button class="admin-toggle-btn" id="adminToggleBtn">⚙ Admin</button>
    </div>
    <nav class="main-nav">
      <button class="nav-btn active" data-view="overview">Overview</button>
      <button class="nav-btn" data-view="scores">Scores</button>
      <button class="nav-btn" data-view="groups">Groups</button>
      <button class="nav-btn" data-view="bracket">Knockout Bracket</button>
      <button class="nav-btn" data-view="insights">✦ Insights</button>
    </nav>
  </header>

  <main id="app-root"></main>

  <aside id="adminPanel" class="admin-panel" aria-hidden="true">
    <div class="admin-panel-header">
      <h2>Admin</h2>
      <p class="admin-panel-hint">Check a team to mark them as eliminated.</p>
      <button class="admin-close-btn" id="adminCloseBtn">✕</button>
    </div>
    <div class="admin-panel-body" id="adminPanelBody"></div>
  </aside>
  <div class="admin-backdrop hidden" id="adminBackdrop"></div>

  <script src="data.js"></script>
  <script src="live.js?v=20260627091927"></script>
  <script src="app.js?v=20260624"></script>
</body>
</html>
