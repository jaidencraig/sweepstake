name: Update live data

on:
  schedule:
    - cron: '0 */3 * * *'   # every 3 hours (00:00, 03:00, 06:00 … UTC)
  workflow_dispatch:          # allows manual trigger from GitHub Actions tab

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # needed to commit and push live.js

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch live data
        env:
          WC_API_KEY: ${{ secrets.WC_API_KEY }}
        run: node fetch-data.js

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add live.js index.html
          git diff --staged --quiet || git commit -m "Auto-update live data"
          git push
